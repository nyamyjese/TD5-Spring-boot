openapi: 3.0.3
info:
  title: Restaurant API
  version: 1.0.0
servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      summary: Retourne la liste de tous les ingrédients
      responses:
        '200':
          description: Liste des ingrédients retournée avec succès
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}:
    get:
      summary: Retourne un ingrédient par son identifiant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ingrédient trouvé et retourné avec succès
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                message: "Ingredient.id=1 is not found"

/ingredients/{id}/stock:
  get:
    summary: Retourne la valeur du stock d'un ingrédient à une date et pour une unité données
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: at
        in: query
        required: true
        schema:
          type: string
          example: "2024-01-06 12:00:00"
      - name: unit
        in: query
        required: true
        schema:
          type: string
          enum: [PCS, KG, L]
    responses:
      '200':
        description: Valeur du stock retournée avec succès
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/StockValue'
      '400':
        description: Paramètre at ou unit manquant
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/ErrorMessage'
            example:
              message: "Either mandatory query parameter `at` or `unit` is not provided."
      '404':
        description: Ingrédient non trouvé
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/ErrorMessage'
            example:
              message: "Ingredient.id=1 is not found"

/dishes:
  get:
    summary: Retourne la liste de tous les plats avec leurs ingrédients
    responses:
      '200':
        description: Liste des plats retournée avec succès
        content:
          text/plain:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Dish'

/dishes/{id}/ingredients:
  put:
    summary: Associe ou dissocie une liste d'ingrédients au plat identifié par id
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        text/plain:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/IngredientRef'
          example:
            - id: 1
            - id: 2
    responses:
      '200':
        description: Liste des ingrédients mise à jour avec succès — retourne le plat mis à jour
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/Dish'
      '400':
        description: Corps de la requête absent
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/ErrorMessage'
            example:
              message: "Request body is mandatory"
      '404':
        description: Plat non trouvé
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/ErrorMessage'
            example:
              message: "Dish.id=1 is not found"

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Tomate"
        category:
          type: string
          enum: [VEGETABLE, ANIMAL, DAIRY, OTHER]
          example: "VEGETABLE"
        price:
          type: number
          example: 600.00

    StockValue:
      type: object
      properties:
        quantity:
          type: number
          example: 4.80
        unit:
          type: string
          enum: [PCS, KG, L]
          example: "KG"

    DishIngredient:
      type: object
      properties:
        ingredient:
          $ref: '#/components/schemas/Ingredient'
        quantity:
          type: number
          example: 0.20
        unit:
          type: string
          enum: [PCS, KG, L]
          example: "KG"

    Dish:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Poulet grillé"
        dishType:
          type: string
          enum: [START, MAIN, DESSERT]
          example: "MAIN"
        price:
          type: number
          nullable: true
          example: 12000.00
        dishIngredients:
          type: array
          items:
            $ref: '#/components/schemas/DishIngredient'

    IngredientRef:
      type: object
      description: Objet contenant uniquement l'identifiant d'un ingrédient existant
      properties:
        id:
          type: integer
          example: 1

    ErrorMessage:
      type: object
      properties:
        message:
          type: string